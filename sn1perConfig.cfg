
//Binds
unbind 4
alias d "disconnect"
alias q "quit"
alias mp "mp_restartgame 1"
alias c "clear"
alias net "toggle net_graph"
bind h "say gl hf"


//MY CROSSHAIR
cl_crosshair_drawoutline "0"
cl_crosshair_dynamic_maxdist_splitratio "0.300000"
cl_crosshair_dynamic_splitalpha_innermod "1"
cl_crosshair_dynamic_splitalpha_outermod "0.5"
cl_crosshair_dynamic_splitdist "7"
cl_crosshair_friendly_warning "1"
cl_crosshair_outlinethickness "0.000000"
cl_crosshair_sniper_show_normal_inaccuracy "0"
cl_crosshair_sniper_width "1"
cl_crosshair_t "0"
cl_crosshairalpha "200"
cl_crosshaircolor "5"
cl_crosshaircolor_b "255"
cl_crosshaircolor_g "255"
cl_crosshaircolor_r "255"
cl_crosshairdot "0"
cl_crosshairgap "-2.200000"
cl_crosshairgap_useweaponvalue "0"	
cl_crosshairsize "2.300000"
cl_crosshairstyle "4"
cl_crosshairthickness "0.400000"
cl_crosshairusealpha "1"
cl_fixedcrosshairgap "3"

//MY VIEWMODEL
cl_viewmodel_shift_left_amt "0.500000"
cl_viewmodel_shift_right_amt "0.250000"
viewmodel_fov "68"
viewmodel_offset_x "2"
viewmodel_offset_y "-2.0"
viewmodel_offset_z "-1"
viewmodel_presetpos "1"
viewmodel_recoil "1.0"
cl_bob_lower_amt "5.000000"
cl_bobamt_lat "0.100000"
cl_bobamt_vert "0.100000"
cl_bobcycle "0.98"

//MY RADER SETTINGS
cl_hud_radar_scale 1
cl_radar_scale 0.4
cl_radar_icon_scale_min 0.8
cl_radar_always_centered 0
cl_radar_rotate 1

//OTHER
cl_join_advertise "2"
sensitivity 1

//SCRIPTS

alias defA "bind e +use"
alias defB "bind r +reload"
alias defC "bind f +lookatweapon"
alias defD "bind q lastinv"
alias defE "bind z radio"
alias defF "bind h text"
alias defG "bind g drop"
alias defH "bind v +voicerecord"

alias text "say gl hf"

alias keyA "bind e keyAA"
alias keyB "bind r keyBB"
alias keyC "bind f keyCC"
alias keyD "bind q keyDD"
alias keyE "bind z keyEE"
alias keyF "bind h keyFF"
alias keyG "bind g keyGG"
alias keyH "bind v keyHH"

alias keyAA "use weapon_flashbang"
alias keyBB "use weapon_hegrenade"
alias keyCC "use weapon_molotov;use weapon_incgrenade"
alias keyDD "use weapon_smokegrenade"
alias keyEE "use weapon_decoy"
alias keyFF "say fack uuu"
alias keyGG "use weapon_c4; drop"
alias keyHH "toggle voice_record"

alias +keybinds "keyA; keyB; keyC; keyD; keyE; keyF"
alias -keybinds "defA; defB; defC; defD; defE; defF"

bind mouse5 +keybinds//

echo "loaded Sn1perConfig.cfg"